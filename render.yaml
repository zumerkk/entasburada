services:
  - type: web
    name: entasburada
    runtime: docker
    plan: standard
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    domains:
      - entasburada.com
    disk:
      name: entas-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://entasburada.com
      - key: XML_IMPORT_ALLOWED_HOSTS
        value: bayi.euro-mix.com.tr
      - key: CATALOG_AI_PROVIDER
        value: auto
      # Asagidakiler Render panelinden elle girilir (.env.production.local dosyasindaki degerler):
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

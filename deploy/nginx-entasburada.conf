server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # certbot --nginx bu blogu otomatik olarak 443'e tasir/yonlendirir

    client_max_body_size 260m;  # admin PDF katalog yukleme siniri

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # urun gorselleri: nginx dogrudan servis etsin (Next'e ugramadan)
    location /uploads/ {
        alias /opt/entasburada/apps/web/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # PDF import islemleri uzun surebilir
        proxy_send_timeout 300s;
    }
}

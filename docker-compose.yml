services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: entas
      POSTGRES_PASSWORD: entas
      POSTGRES_DB: entasburada
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entas -d entasburada"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    environment:
      MINIO_ROOT_USER: entas
      MINIO_ROOT_PASSWORD: entasburada-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  meili-data:
  minio-data:
